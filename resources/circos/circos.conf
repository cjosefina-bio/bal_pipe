# ------------------------------------------------------------
# bal_pipe - Circos configuration
# Separate contigs, genomic annotation and GC content
# ------------------------------------------------------------

karyotype = data/karyotype.txt

chromosomes_display_default = yes
chromosomes_units = 1000

<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>


# ------------------------------------------------------------
# Output
# ------------------------------------------------------------

<image>
dir             = .
file            = circos.png
png             = yes
svg             = yes
radius          = 1700p
angle_offset    = -90
background      = white
auto_alpha_colors = yes
auto_alpha_steps  = 5
</image>


# ------------------------------------------------------------
# Contigs
# Each contig is represented as a separate ideogram.
# ------------------------------------------------------------

<ideogram>

<spacing>
default = 0.008r
</spacing>

radius           = 0.92r
thickness        = 24p
fill             = yes
stroke_color     = black
stroke_thickness = 1p

show_label       = no

</ideogram>


# ------------------------------------------------------------
# Contig size scale
# Coordinates are shown independently for each contig in kb.
# ------------------------------------------------------------

<ticks>

show_ticks       = yes
show_tick_labels = yes

radius           = 1.00r
color            = black
thickness        = 1p

multiplier       = 1e-3
format           = %.0f kb

<tick>
spacing          = 20000
size             = 5p
show_label       = no
</tick>

<tick>
spacing          = 100000
size             = 10p
show_label       = yes
label_size       = 12p
label_offset     = 5p
</tick>

</ticks>


# ------------------------------------------------------------
# Tracks
# ------------------------------------------------------------

<plots>


# CDS forward
<plot>
type             = tile
file             = data/cds_forward.txt
r1               = 0.86r
r0               = 0.80r
layers           = 1
margin           = 0.002u
color            = blue
stroke_thickness = 0
orientation      = out
</plot>


# CDS reverse
<plot>
type             = tile
file             = data/cds_reverse.txt
r1               = 0.78r
r0               = 0.72r
layers           = 1
margin           = 0.002u
color            = red
stroke_thickness = 0
orientation      = in
</plot>


# rRNA
<plot>
type             = tile
file             = data/rrna.txt
r1               = 0.68r
r0               = 0.63r
layers           = 1
margin           = 0.002u
color            = green
stroke_thickness = 0
</plot>


# tRNA
<plot>
type             = tile
file             = data/trna.txt
r1               = 0.61r
r0               = 0.56r
layers           = 1
margin           = 0.002u
color            = orange
stroke_thickness = 0
</plot>


# GC content
<plot>
type             = line
file             = data/gc_content.txt
r1               = 0.49r
r0               = 0.27r
min              = 0
max              = 1
color            = black
thickness        = 2

<axes>
<axis>
position         = 0.5
color            = grey
thickness        = 1
</axis>
</axes>

</plot>


</plots>