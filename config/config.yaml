# ------------------------------------------------- #
# BAL de novo genome assembly - annotation pipeline #
# ------------------------------------------------- #

# ---------------------------------------------------
# Project
# ---------------------------------------------------

project:
  name: bal_pipe
  organism_group: "Lactic Acid Bacteria"
  sequencing_type: "Illumina paired-end"

# ---------------------------------------------------
# General resources
# ---------------------------------------------------

resources:
  threads: 8
  memory_gb: 16

# ---------------------------------------------------
# Samples
# ---------------------------------------------------
samples: 
  LD_01:
    r1: "data/raw/LD_01_R1.fastq"
    r2: "data/raw/LD_01_R2.fastq"

  LR_02:
    r1: "data/raw/LR_02_R1.fastq"
    r2: "data/raw/LR_02_R2.fastq"

  LA_03:
    r1: "data/raw/LA_03_R1.fastq"
    r2: "data/raw/LA_03_R2.fastq"

  LH_04:
    r1: "data/raw/LH_04_R1.fastq"
    r2: "data/raw/LH_04_R2.fastq"    

  LB_05:
    r1: "data/raw/LB_05_R1.fastq"
    r2: "data/raw/LB_05_R2.fastq"

# ---------------------------------------------------
# 00 - Workflow DAG
# ---------------------------------------------------

00_workflow_dag:
  dag_dir: "visual"
  log_dir: "logs/00_workflow_dag"
  final_target: "all"

# ---------------------------------------------------
# 01 - Quality control 
# ---------------------------------------------------

01_quality_control:
  fastqc:
    output_dir: "results/01_quality_control/fastqc"
    log_dir: "logs/01_quality_control/fastqc"
    threads: 4

  multiqc:
    output_dir: "results/01_quality_control/multiqc"
    log_dir: "logs/01_quality_control/multiqc"
    threads: 1

# ---------------------------------------------------
# 02 - Preprocessing
# ---------------------------------------------------

02_preprocessing:
  fastp:
    output_dir: "results/02_preprocessing/fastp"
    log_dir: "logs/02_preprocessing/fastp"
    threads: 4
  
  trimming:
    detect_adapter_for_pe: true
    cut_tail: true
    cut_window_size: 4
    cut_mean_quality: 20
    length_required: 120
    trim_poly_x: true
    trim_poly_g: true

  fastqc:
    output_dir: "results/02_preprocessing/fastqc"
    log_dir: "logs/02_preprocessing/fastqc"
    threads: 4
  
  multiqc:
    output_dir: "results/02_preprocessing/multiqc"
    log_dir: "logs/02_preprocessing/multiqc"
    threads: 1

# --------------------------------------------------
# 03 - Taxonomic classification
# --------------------------------------------------  

03_taxonomic_classification:
  kraken2:
    output_dir: "results/03_taxonomic_classification/kraken2"
    log_dir: "logs/03_taxonomic_classification/kraken2"
    threads: 4

    database: "databases/kraken2_db"

    download_db: false
    db_url: "https://genome-idx.s3.amazonaws.com/kraken/k2_standard_08gb_20250402.tar.gz"
    db_archive: "databases/k2_standard_08gb_20250402.tar.gz"

# --------------------------------------------------
# 04 - De novo assembly
# --------------------------------------------------

04_assembly:
  spades:
    output_dir: "results/04_assembly/spades"
    log_dir: "logs/04_assembly/spades"
    threads: 4
    memory_gb: 8

    careful: true
    isolate: false
    cov_cutoff: 5

# --------------------------------------------------
# 05 - Assembly quality
# --------------------------------------------------

05_assembly_quality:
  quast:
    output_dir: "results/05_assembly_quality/quast"
    log_dir: "logs/05_assembly_quality/quast"
    threads: 4
    memory_gb: 8
    docker_image: "staphb/quast:5.2.0"
    platform: "linux/amd64"

# --------------------------------------------------
# 06 - Annotation
# --------------------------------------------------

06_annotation:
  prokka:
    output_dir: "results/06_annotation/prokka"
    log_dir: "logs/06_annotation/prokka"
    threads: 4
    docker_image: "staphb/prokka:latest"
    platform: "linux/amd64"

    kingdom: "Bacteria"
    genus: "Lactobacillus"
    usegenus: true

# --------------------------------------------------
# 07 - Assembly summary
# --------------------------------------------------

07_assembly_summary:
  reports_file: "results/07_assembly_summary/quast_reports.txt"  
  output_dir: "results/07_assembly_summary"
  log_dir: "logs/07_assembly_summary"

# --------------------------------------------------
# 08 - Annotation summary
# --------------------------------------------------

08_annotation_summary:
  reports_file: "results/08_annotation_summary/prokka_reports.txt"  
  output_dir: "results/08_annotation_summary"
  log_dir: "logs/08_annotation_summary"

# --------------------------------------------------
# 09 - Genomic visualization
# --------------------------------------------------

09_genomic_visualization:
  circos:
    output_dir: "results/09_genomic_visualization/circos"
    log_dir: "logs/09_genomic_visualization/circos"
    conf: "resources/circos/circos.conf"

    docker_image: "staphb/circos:0.69.9"
    platform: "linux/amd64"
    threads: 1

    # Contig selection
    min_contig_length: 10000
    max_contigs: 50

    # GC content calculation
    gc_window_size: 5000
    gc_step_size: 1000
  